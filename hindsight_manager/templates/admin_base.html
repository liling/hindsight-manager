{% extends "base.html" %}
{% block content %}
<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <svg class="sidebar-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 6v6l4 2"/>
                </svg>
                <h3>Hindsight</h3>
            </div>
            <p class="user-info">{{ user.username }}</p>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item{% if nav_active == 'dashboard' %} active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                记忆库
            </a>
            <a href="/api-keys" class="nav-item{% if nav_active == 'api-keys' %} active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.78 7.78 5.5 5.5 0 0 1 7.78-7.78zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                API Keys
            </a>
            <a href="/password/change" class="nav-item{% if nav_active == 'password' %} active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                修改密码
            </a>
            <a href="/profile" class="nav-item{% if nav_active == 'profile' %} active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                个人资料
            </a>
            {% if user.username == 'admin' %}
            <a href="/admin/users" class="nav-item{% if nav_active == 'users' %} active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                用户管理
            </a>
            {% endif %}
        </nav>
        <div class="sidebar-footer">
            <a href="/auth/logout" class="nav-item nav-logout" onclick="handleLogout(event)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                退出登录
            </a>
        </div>
    </aside>

    <main class="main-content">
        {% block main %}{% endblock %}
    </main>
</div>
<script>
function handleLogout(e) {
    e.preventDefault();
    fetch('/auth/logout', { method: 'POST' })
        .then(() => window.location.href = '/login');
}
</script>
{% endblock %}
