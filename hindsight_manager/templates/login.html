{% extends "base.html" %}
{% block title %}登录 - Hindsight{% endblock %}
{% block content %}
<div class="login-container">
    <h1>Hindsight</h1>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form id="loginForm" action="/auth/login/form" method="POST" class="login-form">
        <input type="hidden" name="provider" value="local">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
    </form>
    <div class="login-links">
        <a href="/password/forgot">忘记密码？</a>
    </div>
</div>

<script>
const loginForm = document.getElementById('loginForm');
loginForm.addEventListener('submit', function(e) {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
        e.preventDefault();
        showError('请输入用户名和密码');
        return false;
    }
});

function showError(message) {
    const existingAlert = document.querySelector('.alert-error');
    if (existingAlert) existingAlert.remove();

    const alertDiv = document.createElement('div');
    alertDiv.className = 'alert alert-error';
    alertDiv.textContent = message;
    document.querySelector('.login-container').insertBefore(alertDiv, document.querySelector('.login-form'));
}
</script>
{% endblock %}
