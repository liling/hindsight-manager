{% extends "base.html" %}
{% block title %}重置密码 - Hindsight{% endblock %}
{% block content %}
<div class="password-container">
    <h1>重置密码</h1>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if message %}
    <div class="alert alert-success">{{ message }}</div>
    {% endif %}

    {% if show_reset_form %}
    <form id="resetPasswordForm" class="password-form">
        <div class="form-group">
            <label for="email">邮箱地址</label>
            <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="code">验证码</label>
            <input type="text" id="code" name="code" required placeholder="请输入邮箱收到的6位验证码">
        </div>
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" id="new_password" name="new_password" required autocomplete="new-password">
            <small class="text-muted">密码至少8位，包含大小写字母、数字和特殊字符</small>
        </div>
        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">重置密码</button>
    </form>
    {% else %}
    <form id="forgotPasswordForm" class="password-form">
        <div class="form-group">
            <label for="email">邮箱地址</label>
            <input type="email" id="email" name="email" required autocomplete="email">
            <small class="text-muted">我们将向您的邮箱发送密码重置验证码</small>
        </div>
        <button type="submit" class="btn btn-primary btn-block">发送验证码</button>
    </form>
    {% endif %}

    <div class="password-links">
        <a href="/login">返回登录</a>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const forgotPasswordForm = document.getElementById('forgotPasswordForm');
    const resetPasswordForm = document.getElementById('resetPasswordForm');

    if (forgotPasswordForm) {
        forgotPasswordForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;

            try {
                const response = await fetch('/password/forgot', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(data.message || '验证码已发送到您的邮箱');
                    setTimeout(() => {
                        window.location.href = '/password/reset?email=' + encodeURIComponent(email);
                    }, 2000);
                } else {
                    showError(data.detail || '发送验证码失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
            }
        });
    }

    if (resetPasswordForm) {
        resetPasswordForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // Client-side validation
            if (newPassword !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            try {
                const response = await fetch('/password/reset', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        code: code,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(data.message || '密码重置成功');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showError(data.detail || '密码重置失败');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
            }
        });
    }
});

function showError(message) {
    const existingAlert = document.querySelector('.alert-error');
    if (existingAlert) {
        existingAlert.remove();
    }

    const alertDiv = document.createElement('div');
    alertDiv.className = 'alert alert-error';
    alertDiv.textContent = message;
    document.querySelector('.password-container').insertBefore(alertDiv, document.querySelector('.password-form'));
}

function showSuccess(message) {
    const existingAlert = document.querySelector('.alert-success');
    if (existingAlert) {
        existingAlert.remove();
    }

    const alertDiv = document.createElement('div');
    alertDiv.className = 'alert alert-success';
    alertDiv.textContent = message;
    document.querySelector('.password-container').insertBefore(alertDiv, document.querySelector('.password-form'));
}
</script>
{% endblock %}
