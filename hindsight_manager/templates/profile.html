{% extends "admin_base.html" %}
{% block title %}个人资料 - {{ brand }}{% endblock %}
{% block main %}
<div class="content-header">
    <h2>个人资料</h2>
</div>

<div class="profile-card">
    <div class="profile-field">
        <label>用户名</label>
        <input type="text" value="{{ current_user.username }}" readonly>
    </div>
    <div class="profile-field">
        <label>显示名称</label>
        <input type="text" value="{{ current_user.display_name }}" readonly>
    </div>
    <div class="profile-field">
        <label>邮箱</label>
        <input type="email" value="{{ current_user.email or '未设置' }}" readonly>
    </div>
    <div class="profile-field">
        <label>认证方式</label>
        <input type="text" value="{{ current_user.auth_provider.value if current_user.auth_provider else '—' }}" readonly>
    </div>
    <div class="profile-field">
        <label>账号状态</label>
        <input type="text" value="{% if current_user.is_active %}正常{% elif current_user.is_active is none %}—{% else %}已禁用{% endif %}" readonly>
    </div>
</div>
<script src="{{ '/static/app.js' | asset_url }}"></script>
{% endblock %}
