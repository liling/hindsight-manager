name: Build Image

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build hindsight-manager
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: sha
        run: echo "SHORT=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/hindsight-manager:latest
            ghcr.io/${{ github.repository_owner }}/hindsight-manager:${{ steps.sha.outputs.SHORT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
